planet.rospule-rospuleball.name = 罗塞普

# --Map texts--
# --1-1--
sector.rospule-1-1.name = 1-1\n万物伊始
sector.rospule-1-1.description = 欢迎来到罗塞普，这里是赛普罗的平行宇宙世界。 \n收集资源，解锁科技，站稳脚跟。
1-1.mine = 点击铜矿石 来开采铜。
1-1.research = 打开你的科技树 并研究任何所能研究科技的来继续。
1-1.place = 点击选择生产 栏目并选择机械钻头。\n再次在指定区域单击来在铜矿上放置钻头。
1-1.conveyor = 钻头可以自动化挖掘铜，但是钻头需要输出端才能将铜 运至核心。\n建造一条传送带 输送线把钻头和核心连接起来。
1-1.moreconveyor = 放置更多的机械钻头 来提升产量。\n多条传送带 的输入可以合并到一条输送线上。
1-1.expand =  使用 W/A/S/D 向前移动，推进。
1-1.router = 路由器 接受一端的输入并且均等的将物品分配至剩下三个方向。\n 相邻放置路由器会导致回流。
1-1.junction = 交叉器 作为两条相交叉的传送带的枢纽。\n 注意交叉器不会主动分配物品。
1-1.placeduo = 使用自动化防御塔来防御敌袭。\n建造2个双管。
1-1.feedammo = 像双管 这种炮塔需要装填弹药 才能自动开火。\n使用机械钻头，传送带和路由器将挖掘的铜运输至双管中装填弹药。
1-1.supply = 给炮塔装填弹药
1-1.enemy = 敌人单位即将在{0}秒后接近
1-1.spawnwarning = 敌人在敌军出生点生成。\n敌军出生点具有一个范围区域。\n当波次开始时范围区域内的所有东西都会被摧毁！
1-1.defend = 现在建造双管，装填弹药，防御核心，存活到最后一波结束。
# --1-2--
sector.rospule-1-2.name = 1-2\n冰寒通道
sector.rospule-1-2.description = 这片冰冷的区域更靠近敌人活动范围。 \建立自动化防御抵御敌军的巡逻部队。

1-2.lead = 铅矿石 是另一种重要资源，和铜 一样。\n使用核心机 或者机械钻头 来挖掘铅。
1-2.expand = 前进以继续。
1-2.sorter = 分类器 是一种允许[accent]同种类型[white]的资源通过的运输器件。\n与分类器设置的类型不匹配的资源会被分配到两侧。\n 没有设置过的空白分类器会将所有类型的物品均分配到两侧。
1-2.isorter = 反向分类器 与分类器 非常相似，但是对于匹配类型的资源会被分配到两侧，不同类型的资源会通过向前。\n 没有设置过的空白反向分类器会将所有类型的物品通过向前。
1-2.wall = 铜墙 可以吸收敌人单位的火力，让炮塔 受到保护而不被摧毁。
# --1-3--
sector.rospule-1-3.name = 1-3\n针叶林
sector.rospule-1-3.description = 这里坐落着一大片冻结的针叶树林。\n敌人的攻击部队中探测到了敌对空中单位。\n「[salmon]存在守卫者[white]」

1-3.bridge = 传送带桥 可以跨越地形和实体方块。\n 试着用传送带桥 把铅 送出洞穴。\n 注意传送带桥需要设置链接才能正常运输物品。
1-3.derelict = 废墟建筑是被遗弃的中立建筑。\n将它们回收成资源或者修复它们让它们正常工作。
1-3.bridge2 = 传送带桥的输出端可以同时接入多条传送带。\n传送带桥的输入端也能同时接收多条输入。
1-3.ammofeed = 给炮塔装填弹药/
1-3.buildscatter = 检测到空中单位。 诸如双管 这类塔无法精准命中迅速的空中单位。\n建造分裂 作为防空塔。\n⚠ 分裂炮塔只能瞄准和攻击[accent]空中[white]单位。
1-3.stuffammo = 时刻注意炮塔的面板信息。\n经常查看[accent]核心数据库[white] 来了解什么炮塔需要什么类型的弹药。\n找到合适的弹药类型 来装填分裂 的弹药。
1-3.guardian = 守卫者单位是具有独特血条的[accent]精英单位[white]。\n它们相较于普通的同类单位而言有着更高的数值。\n时刻注意守卫boss的警告提示来准备防御。
# --1-4--
sector.rospule-1-4.name = 1-4\n低洼地带
sector.rospule-1-4.description = 一片附近有化石沉积煤的低海拔河床。\n收集煤炭并开始学习使用石墨压缩机。

1-4.minecoal = 煤炭 是另一种基础资源。\n使用钻头 开采煤炭并送至传送带。
1-4.buildpress = 研究并放置一个石墨压缩机。\n石墨压缩机是第一个生产 类建筑，它可以[accent]生产[white]石墨。
1-4.graphiteprod = 要让石墨压缩机能够正常工作，它需要持续的输入煤炭。\n使用运输 器件将煤炭 送入石墨压缩机。\n当石墨压缩机 内储存有足够多的煤炭，它就会自动生成石墨。\n注意石墨压缩机储存石墨的容量有限，使用传送带输出它们！
1-4.pneumatic = 当你获得了石墨 ，你可以建造一种升级版的钻头。\n注意建造它比机械钻头花费[accent]更多的铜[white] 和石墨。
1-4.duoammo = 时刻察看[accent]核心数据库[white]！ 诸如双管 这类炮塔也可以使用石墨 来作为弹药。\n当双管使用石墨 作为弹药的时候，它发射更强力的子弹。
1-4.findspawn = 注意这张地图的地形有不止一个可能是生成点的地形。\n移动你的核心机 侦察区块并找出真正的敌人生成点。
# --1-5--
sector.rospule-1-5.name = 1-5\n交叉口
sector.rospule-1-5.description = 两条不同的道路交叉在了一起，形成了一条不可预测的路径。\n学会使用新的防御塔，找出敌人的行动路径并成功防御该区块。

1-5.scorch = 火焰 是一种新的防御塔，建造它需要石墨 。\n它使用煤炭作为弹药并且在近距离高度有效。\n[red]小心对待！任何装有煤炭的建筑[white][]在被摧毁时会起火！[white]
1-5.underflow = 反向溢流门 总是最优先将物品运输至两侧。\n只有当两侧被堵住的时候才会向正前方运输物品。
1-5.overflow = 溢流门 总是最优先将物品运输向前。\n只有当正前方被堵住的时候才会向两侧运输物品。
# --1-6--
sector.rospule-1-6.name = 1-6\n积雪煤原
sector.rospule-1-6.description = 很久以前，在这片河床附近的茂密植株残骸转变成了大量煤炭资源。\n开始使用煤炭 生产电力 并学会使用电弧 塔。\n「[salmon]存在守卫者[white]」

1-6.combustion = 火力发电机 需要持续输入煤炭 并且可以生产电力。\n电力 是一种使用电力节点 来相互传导的无形资源。
1-6.node = 电力节点 类似于传送带桥，可以链接到其他电力建筑。\n用电力节点互相链接起来的电力建筑共享同一个电力网。
1-6.morecombustion = 建造更多的火力发电机 并让它们正常工作来继续。\n这么做会提升电力网的总电力 产出。
1-6.enoughpower = 拥有一个产出 +240 电力/秒 (4x )的电力网
1-6.battery = 电池 在有正向电力产出的时候储存电力。\n它们也应该被电力节点链接至一个电力网。
1-6.enoughstorage = 拥有一个储存 4000 电力 (1x 充满的)的电力网
1-6.moremoremore = 拥有一个产出 +480 电力/秒 (8x ) 且储存 20000 电力 (5x 充满的)的电力网
1-6.batterystore = 电池 在电网电力产出变为负值时消耗储存的电力来放电。\n这使得用电建筑能够仍然正常工作。
1-6.arc = 电弧 是一座使用电力 而不是弹药 来开火的炮塔。\n 电弧只在开火的时候才会消耗电力。\n使用电弧塔时电池 是必备的。
1-6.onlyarc = 这个区块禁止使用双管 和火焰 ，试着使用用电弧 作为唯一的对地炮塔来进行防御。
1-6.setupmore = 尝试建立一个更大的电力网来完成任务目标。\n强烈建议将所有建筑用电力节点连接在一起，\n毕竟单一一个电力网维护和管理起来要容易得多。
1-6.flare = 一些特定种类的空中单位优先攻击发电机！\n总是建造分裂 来保护你的电力生产设施！
# --1-7--
sector.rospule-1-7.name = 1-7\n上游源头
sector.rospule-1-7.description = 这是一条流动小溪的上游发源地。\n使用窑炉 炼制钢化玻璃，使用泵来利用水资源。

1-7.countdown = 敌人单位将在 {0} 后接近
1-7.kiln = 研究并建造一个窑炉。\n窑炉是另一种可以生产钢化玻璃 的生产 建筑。\n时刻察看[accent]核心数据库[white] 来了解要让一个窑炉正常工作都需要些什么。
1-7.pump = 研究机械泵。 泵 可以放置在水地块上面来稳定产出水。\n水 是一种液体资源。
1-7.conduit = 要运输液体资源，研究并使用在液体 栏目的导管。\n输入水 的炮塔开火速度会更快。
# --1-8--
sector.rospule-1-8.name = 1-8\n不冻湖
sector.rospule-1-8.description = 这里接近更温暖的地段。\n这里坐落着一片巨大的圆形不冻湖。\n相比起之前的区块，这里的资源更加稀缺。\n试着使用泵 来加速钻头，让它们挖掘得更快。

1-8.waterdrill = 气动钻头在输入水 的时候拥有快得多的挖掘速度。\n 在着陆到新区块的时候总是试着研究任何所能研究的东西。\n冰雹 是一座使用石墨 的长距离对地炮塔。
# --1-9--
sector.rospule-1-9.name = 1-9\n阵风峡谷
sector.rospule-1-9.description = 数条河流流经这个区块，形成了错杂的地形。\n使用修复器 来修复受损的建筑。\n生产硫化物 作为冰雹 的先进弹药。\n「[salmon]存在守卫者[white]」

1-9.mender = 修复器 使用电力 并且自动修复附近受损的建筑。
1-9.pyratite = 硫化物混合器是一种可以生产硫化物 的复杂生产建筑。\n硫化物是一种高度易燃的复合产物。
# --1-10--
sector.rospule-1-10.name = 1-10\n形势不利
sector.rospule-1-10.description =之前占领的数个区块的行为引起了敌军的注意。\n一批浩大的单位部队正在直接赶来重新夺下这些区块的控制权。\n在这条极寒山谷的出口一场恶战在所难免。\n做好最坏的打算，从敌人潮水般的攻击中不惜一切代价生存下来。\n「[scarlet]⚠极大规模敌人猛攻⚠[white]」

1-10.battle = 这是一个大规模攻势区块。\n敌人的单位会源源不断赶来，并且攻击随时间越来越猛烈。\n[accent]不惜一切代价[white]保护核心。
1-10.countdown = 敌人将在 {0} 后发起攻势
1-10.survive = 从敌人的大规模攻击中生存下来
1-10.enemyescalating = [salmon]警 告\n⚠敌人攻势加剧中⚠[white]
1-10.enemyescalating2 = [scarlet]警 告\n⚠!敌人攻势加剧中!⚠[white]
# --2-1--
sector.rospule-2-1.name = 2-1\n过渡地带
sector.rospule-2-1.description = 更靠近温暖的地区，这片极寒山谷的出口通向了一条狭窄的沙地通道。\n使用硅冶炼厂从沙子和煤炭中制造硅。

2-1.silicon = WIP
# --2-2--
sector.rospule-2-2.name = 2-2\n废铁垃圾场
sector.rospule-2-2.description = 扫描到了数个曾经是大型建筑的废墟。\n该区块附近没有敌人巡逻。\n生产足够多的硅来占领该区块。\n「[accent]生产区块[white]」

2-2.gather = 这个区块没有天然的沙子。\n使用粉碎机 把废料 转变成沙子。\n生产区块不会有任何敌袭。 \n[accent]专心致志于生产物资来完成目标占领区块。
# --2-3--
sector.rospule-2-3.name = 2-3\n喀斯特地貌
sector.rospule-2-3.description = 这个区块有着中等敌人数量。\n水侵蚀了墙体，将这座河谷变成了美丽的风景线。 \n一些更加高级的单位正在接近该区块。\n建立更强大的防线。\n「[salmon]存在守卫者[white]」

2-3.solar = 太阳能板 可以无条件持续产出电力。\n注意它们的电力产出受昼夜影响。
# --2-4--
sector.rospule-2-4.name = 2-4\n第一次冲突
sector.rospule-2-4.description = 在这个区块检测到了敌人基地。\n开始建筑单位 主动攻击敌人。\n摧毁敌人的核心来解决它们。

2-4.groundfactory = 有时初始的建筑放置的并不完美。\n重新安排混乱的传送带来清理出空间。\n空出地方，研究并建造一个[accent]陆军工厂[]。
2-4.makedagger = 研究并从陆军工厂生产一个尖刀 。\n\n单击陆军工厂并选择尖刀 图标来进行生产。\n建造单位同样需要输入物资到陆军工厂中。
2-4.makemoredagger = 这个区块有敌人基地， 强大的进攻力量必不可少。\n生产更多尖刀。
2-4.switch = 试着生产一个爬虫。 \n亦或选择已有的陆军工厂并选择爬虫 图标来进行生产，\n或者建造一个新的陆军工厂。
2-4.enemycountdown = 敌人将在{0}后发起进攻
2-4.command = 单位需要被指挥才能进攻。\n长按键盘上的[accent]shift[]键来进入指挥模式。\n使用[accent]鼠标左键[]拖拽来框选单位。\n使用[accent]鼠标右键[]来给单位下达移动或者攻击指令。
2-4.attack = 使用指挥模式移动单位来攻击敌人基地。\n摧毁基地难免会有必要的牺牲。\n不要忘记一直让陆军工厂运作。
2-4.warn = 在一个进攻区块，敌人的波次会永无止境地增长。\n要占领这类区块，尽可能最快的摧毁[accent]所有敌方核心[]。
2-4.wave = 敌人会在2分钟后接近这里。 像以往区块一样建立防御。
# --2-5--
sector.rospule-2-5.name = 2-5\n远古城墙
sector.rospule-2-5.description = 在过去的时间里，这里发生过数次冲突。\n这里曾经建立起过一层前线防御，如今已化为废铁。 \n将废料熔化 成矿渣 并用作波浪 塔的液体弹药。

2-5.wave = 波浪 塔使用[accent]液体[] 作为弹药，使用熔炉 将废料熔化成矿渣 。\n矿渣 是一种液体。
# --2-6--
sector.rospule-2-6.name = 2-6\n支流
sector.rospule-2-6.description = 通过黑沙峡谷，一条长河流经这个区块。\n已解锁可以产生更多电力的高级发电机 。\n罗塞普正在进入夜晚时分，太阳能板现在[accent]发电效率更低[]。\n「[salmon]存在守卫者[white]」\n「[unlaunched]夜晚时分[white]」

2-6.synergy = 波浪 塔在装填水 时可以对敌人造成潮湿 效果。\n电弧 可以对潮湿 的敌人造成[accent]更高伤害[]。\n地面单位当踩在水体地板 上时同样会受到潮湿 效果。
# --2-7--
sector.rospule-2-7.name = 2-7\n微型哨站
sector.rospule-2-7.description = 数个敌人基地挡住了前进的路。\n使用空军工厂 生产星辉 摧毁核心。

2-7.unitcap =同时最大只能拥有[accent]8[]个[accent]同种类[]单位。\n单位上限可以在后续的区块中得到提升。
# --2-8--
sector.rospule-2-8.name = 2-8\n扩散源地
sector.rospule-2-8.description = 曾经是生产生物质产物的巨大设施。\n在旧时的战争中，这片地方被废弃了，孢子向外泄露并广泛传播。\n重新取得古老的生物质科技。\n在即将到来的攻击中仅检测到了空中单位。\n在没有分裂 的帮助下生存下来。

2-8.spore = 孢子荚 可以从培养机 中生产。\n与煤炭类似，孢子荚高度易燃并且可以用作发电机的燃料。\n孢子压缩机 从孢子荚中压取油。
2-8.ban = 这个区块[accent]禁止使用分裂[]作为防空系统。\n试着找出其他替代品来抵抗敏捷的空中单位。
# --2-9--
sector.rospule-2-9.name = 2-9\n枯竭矿场
sector.rospule-2-9.description = 过去对这个区块矿石资源的过度开发导致了铜与铅的枯竭。\n生产独影 来自动钻探基础资源。\n[accent]爬虫类单位[]出没，它们可以直接穿行通过薄墙体。\n「[salmon]存在守卫者[white]」

2-9.mono = 独影 是一种不能攻击的空中单位。\n它们配备有可以挖掘铜和铅的挖矿光束，并[accent]自动[]将它们送至核心。\n修复点 可以修复受损的友军单位。
# --2-10--
sector.rospule-2-10.name = 2-10\n报复行径
sector.rospule-2-10.description = 最近占领区块的行为完全激怒了敌人。\n敌人核心被摧毁后导致它们派遣出了一大股报复部队来夺取曾经的区块。\n必须阻止这些单位重新夺得区块。\n准备好在山脚处展开一场异常凶残的战斗。\n「[scarlet]⚠极大规模敌人猛攻⚠[white]」

2-10.countdown = 敌人将在 {0} 后发起攻势
2-10.defend = [accent]不惜一切代价[]保护核心！
2-10.survive = 从敌人的大规模攻击中生存下来
2-10.threat = [scarlet]--[]--\n--通讯接入--\n\n\n{我们}--{永远}--{不会}--{忘记}--{你的}--{所作}--{所为}[]
# --3-1--
sector.rospule-3-1.name = 3-1\n雷区
sector.rospule-3-1.description = 在旧时的战争中，在山区的入口处曾部署了一片雷区。\n修复它们来用作防御敌人的手段。\n所有防御塔均不可用，尝试只使用脉冲地雷 和生产的单位 进行防御。

3-1.thermal = 地热发电机 在放置在地热地板上 时可以持续产出电力。
3-1.repair = 长按键盘上的[accent]B[] 同时进行拖动框选可以快速修复框选区域内的所有废墟建筑。\n长安[accent]B[] 键进行框选同样可以规划重建所有框选区域内曾经被摧毁的建筑。
3-1.banned = 这个区块[accent]禁用所有防御塔[]。\n修复废墟脉冲地雷来击退敌人陆军。\n[accent]尖刀[] 单位的武器可以瞄准空中目标。
# --3-2--
sector.rospule-3-2.name = 3-2\n锐利岩隙
sector.rospule-3-2.description = 深入群山，在页岩裂隙带的空间变得更狭窄了。\n发现钛矿石。使用[accent]气动钻头[] 挖掘钛。\n「[unlaunched]夜晚时分[white]」

3-2.armor = 更强大的敌人单位 拥有更高的[accent]护甲值[]。\n[accent]护甲值[] 直接减少受到的伤害。\n诸如 单颗子弹伤害低的防御塔\n对抗这些单位会[accent]相当乏力[]。
# --3-3--
sector.rospule-3-3.name = 3-3\n背风坡
sector.rospule-3-3.description = 山脊将大风隔绝在了另一侧。\n山区的资源非常稀少，均离预计核心降落地点较远。\n已派遣独影帮助收集基础资源。\n可以进行一次核心的升级了。\n「[salmon]存在守卫者[white]」

3-3.titabelt = 钛传送带 比普通传送带运输物品更快。
3-3.core = 当初存有足够的物品时，可以选择升级到次代核心 。\n直接将次代核心放置在初始核心上方来升级它。\n次代核心 比初始核心拥有更高的生命值，更多的物品容量以及更高的单位上限。
# --3-4--
sector.rospule-3-4.name = 3-4\n大坝
sector.rospule-3-4.description = 在旧时期这里建立了一座巨大的重力水坝。\n敌人接管了这片区域并在大坝上修建了防线。\n将尖刀单位 重构成更强大的战锤单位 来摧毁敌人的防御。\n「[unlaunched]夜晚时分[white]」

3-4.enemy = 敌人将在{0}后接近
3-4.recons = [accent]数增级单位重构工厂[]\n使用硅 和石墨 将1级单位升级至2级。\n[accent]研究并放置重构工厂\n[]将一个尖刀[accent]重构成[]一个[accent]战锤[].
# --3-5--
sector.rospule-3-5.name = 3-5\n生锈铁道
sector.rospule-3-5.description = 这里曾经有一条作用不明的铁道。\n检测到敌人分为了[accent]2股兵力[]来尝试包抄区块。\n另外还检测到了[accent]海军[]单位出没。\n谨慎占领该区块，使用[accent]齐射塔[] 阻挡敌人。

3-5.multispawn = 这个区块同时有[accent]2个敌人出生点[]。\n齐射塔 使用[accent]相当的[] 弹药量来爆发发射强力的子弹流。
# --3-6--
sector.rospule-3-6.name = 3-6\n热泉带
sector.rospule-3-6.description = 地底下的强烈地热能涌出了热泉。\n煤炭资源稀缺。\n使用齐射和差扰 塔来阻止敌人。\n「[salmon]存在守卫者[white]」
# --3-7--
sector.rospule-3-7.name = 3-7\n观象台
sector.rospule-3-7.description = 在山峰峰顶附近的一片平坦地。\n曾经这里有一座观测星体的观象台，已被遗弃。\nE敌人接管了这片遗址并建设了一个远离地面道路的基地。\n检测到了重防空火力。\n生产[accent]新星[] 来[accent]助推[] 越过地形，发动奇袭。

3-7.nova = 新星 单位可以助推越过地形，也能协助建造。\n生产一些新星。
3-7.boost = 进入[accent]指挥模式[] 并选中新星。\n按下指挥模式面板上的[accent]助推[] 按钮让新星进入助推。\n助推中的单位算作空中单位，但是[accent]无法攻击[]。\n跟随箭头指引发动一次奇袭。
3-7.land = 按下指挥模式面板上的[accent]移动[] 按钮让新星着陆。\n着陆后，它们算作常规地面单位。\n摧毁敌人的基地。
# --3-8--
sector.rospule-3-8.name = 3-8\n石油谷缝
sector.rospule-3-8.description = 这里的页岩富足石油资源。\n从石油 中离心 出煤炭。\n[accent]高级石墨加工[] 技术 已解锁。\n已部署[accent]幻型[] 协助区块生产开发。\n「[accent]生产区块[white]」

3-8.poly = 幻型 单位是[accent]全项多功能[] 单位。\n可以挖掘矿石，修复方块，重建建筑，\n协助玩家，另装配一个导弹发射器，可以治疗 附近单位。
# --3-9--
sector.rospule-3-9.name = 3-9\n垮塌山丘
sector.rospule-3-9.description = 在一场地震后，山体滑坡将一些废墟建筑掩埋在了下面。\n更大规模的敌人正在接近，不能轻视它们。\n资源相当分散，难以运输至核心。\n[accent]幻型[]在这里会有帮助。\n「[salmon]存在守卫者[white]」

3-9.status = 强烈建议打开建筑状态。\n进入设置 - 图像 - 显示建筑状态。\n[acid]绿色[]菱形代表该建筑在正常工作。\n[accent]黄色[]代表该建筑没有输出端(已满且就绪)。\n[salmon]红色[]菱形代表建筑缺少条件无法工作。\n建筑状态信息能让管理工厂状态[accent]轻松得多[]。
# --3-10--
sector.rospule-3-10.name = 3-10\n进退两难
sector.rospule-3-10.description = 似乎敌人这次先行一步了。\n一股强大的敌军势力已经提前抵达了沙地洞穴。\n它们这一次是要动真格复仇了。\n另一批敌人的援军正在从后方接近。\n准备好面对一场糟糕的2侧钳形攻势。\n「[scarlet]⚠极大规模敌人猛攻⚠[white]」

3-10.threat = [scarlet]--[]--\n--通讯接入--\n\n\n{不要}--{认为}--{这次}--{是}--{你们}--{占据了}--{优势}[]
3-10.countdown = 敌人将在 {0} 后发起攻势
3-10.estimate = 预计敌军后方援军抵达时间剩余: {0}
3-10.survive = 生存下去......
