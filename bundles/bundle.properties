planet.rospule-rospuleball.name = Rospule

# --Map texts--
# --1-1--
sector.rospule-1-1.name = 1-1\nEverything Begins
sector.rospule-1-1.description = Welcome to Rospule, this is a parallel universe of Serpulo. \nCollect resources and grasp technologies to gain footstand.

1-1.mine = Click on the copper ore to mine copper.
1-1.research = Open your tech tree and research anything available to proceed.
1-1.place = Click on the production tab and select the mechanical drill.\nThen click again in a designated area to place the drill on copper ores.
1-1.conveyor = Drills can automatically mine copper, yet they need outputs to send resources into your core.\nConstruct a line of conveyors to connect the drill to your core.
1-1.moreconveyor = Place more mechanical drills to speed up your resource extraction.\nMultiple conveyor entries can be merged into one line.
1-1.expand =  Move forward for further instructions.
1-1.router = Routers can accept multiple inputs and equally distribute items into the rest of the directions.\n Placing adjacent routers may cause backflow.
1-1.junction = Junctions act as crossroads for two conveyor lines.\n They do not proactively distrubute items.
1-1.placeduo = Use automated turrets to fend off enemies.\nPlace 2 duos.
1-1.feedammo = Turrets like duo will need ammo to function.\nUse mechanical drills, conveyors and routers to transfer mined copper into the duo to load it up with ammo.
1-1.supply = Supply your turrets with ammo
1-1.enemy = Enemy units approaching in: {0}!
1-1.spawnwarning = Enemies spawn in drop zones.\nDrop zones have an area of a certain radius.\nWhen a wave starts, anything inside the raidus will be instantly destroyed!
1-1.defend = Now build more duos, supply them with ammo, defend your core and survive untill the final wave ends.
# --1-2--
sector.rospule-1-2.name = 1-2\nFrozen Passage
sector.rospule-1-2.description = This chilling place is closer to enemy activities. \nSet up defenses to ward off enemy patrols.

1-2.lead = Lead is an another crucial resource, same as copper.\nUse your core drone or mechanical drills to mine it.
1-2.expand = Move forward to proceed.
1-2.sorter = Sorter is a distrubution block that allows item of [accent]the selected type[] to pass through.\nOther items will be distributed between its sides.\n Unselected sorters distribute every type of item between both sides only.
1-2.isorter = Inverted Sorters are pretty similar to sorters,\nbut they distribute selected items to both sides and let other items pass through.\n Unselected inverted sorters let every item pass through.
1-2.wall = Copper walls are useful to absorb enemy firepower, making turrets safer from being destroyed.
# --1-3--
sector.rospule-1-3.name = 1-3\nTaiga
sector.rospule-1-3.description = A massive frozen pinewood forest lies here.\nHostile aerial units detected in the approaching attack.\n「[salmon]Guardian Presence[white]」

1-3.bridge = Bridge conveyors can move items across terrain or solid blocks.\n Try using bridge conveyors to move lead out of the cave.\nBridge conveyors can be manualy configured to connect with eachother, but usualy the automatic connection should be enough.
1-3.derelict = Derelict blocks are abandoned neutral structures.\nDeconstruct them for resources or repair them to restore functionality. \nHold the B key on your pc or the schematics button, then the wrench button on your phone, then select an area you want to reconstruct. 
1-3.bridge2 = Bridge conveyors output simultaneously into multiple directions.\nBridge conveyor's input can also accept multiple inputs simultaneously.
1-3.ammofeed = Supply turrets with ammo/
1-3.buildscatter = Aerial units detected. Turrets like duo cannot precisely hit agile aerial targets.\nConstruct scatter turrets for anti-air defenses.\n⚠Scatter can only target and hit [accent]air[] units.
1-3.stuffammo = Always pay attention to turret's stats.\nFrequently check the [accent]core database[] to know what items can be used as ammo.\nFind the correct ammo type to supply the scatter with.
1-3.guardian = Guardian units are [accent]elite units[] with a unique health bar.\nThey have slightly higher stats than their normal counterparts.\nPay attention to the Guardian warning to prepare proper defenses.
# --1-4--
sector.rospule-1-4.name = 1-4\nLowlands
sector.rospule-1-4.description = A low-altitude riverbed with fossilized coals all around the place.\nGather coal and start to learn the usage of the graphite press.

1-4.minecoal = Coal is an another basic resource.\nUse drills to gather coal.
1-4.buildpress = Research and place a graphite press.\nIt is located in the crafting tab and [accent]produces[] graphite.
1-4.graphiteprod = To make the graphite press work, it needs a constant input of coal.\n Use distribution blocks to supply the press.\nGraphite will be produced automatically once there is enough coal in the graphite press.\nThe presses have limited storage, use conveyors to transport the graphite to your core so they don't clog!
1-4.pneumatic = Once you gain access to graphite, you can construct an upgraded verison of the mechanical drill.\nIt costs [accent]more copper[] and graphite to build than mechanical drills.
1-4.duoammo = Always check the [accent]core database[]! Turrets like duo can also use graphite as ammmo.\nDuos fire more powerful projectiles when using graphite as ammo.
1-4.findspawn = This map has more than one place that looks like it could have a drop zone.\nMove around with your core drone to scout the area and find the exact spawn point's position.
# --1-5--
sector.rospule-1-5.name = 1-5\nCrossing Point
sector.rospule-1-5.description = Two different paths cross together, forming into an unpredictable terrain.\nLearn to use new turrets, figure out the enemy paths and successfully defend the sector.

1-5.scorch = Scorch is a new turret that takes graphite to build.\nIt uses coal as ammo and is very effective at close range.\n[red]Handle with care! All buildings with coal[][red] will start a fire when they are destroyed![white]
1-5.underflow = Underflow Gate always prioritizes outputting items to the sides.\nIf both sides are full/clogged, outputs to the front.
1-5.overflow = Overflow Gate always prioritizes outputting items forward.\nIf both sides are full/clogged, outputs to the sides.
# --1-6--
sector.rospule-1-6.name = 1-6\nSnowpiled Coalfield
sector.rospule-1-6.description = Ages ago, the remains of rich plants near the riverbed transformed into gigantic patches of coal.\nStart using coal to generate power and learn how to use the arc turret.\n「[salmon]Guardian Presence[white]」

1-6.combustion = Combustion generator requires constant coal intake and can produce power.\nPower is an invisible resource that uses power nodes to transport.
1-6.node = Power nodes are like bridge conveyors that can be connected to other power blocks.\nPower blocks interconnected by nodes share the same power grid.
1-6.morecombustion = Place more combustion generators and make supply them with coal to proceed.\nThis increases the power grid's total power production.
1-6.enoughpower = Amass +240 power/sec (4x ) in one power grid
1-6.battery = Batteries store power when the power is in abundance.\nThey should be connected to a power grid by power nodes.
1-6.enoughstorage = Amass 4000 power storage (1x full) in one power grid
1-6.moremoremore = Amass +480 power/sec (8x ) in one power grid\nAmass 20000 power storage (5x full) in one power grid
1-6.batterystore = Batteries drain stored power when the grid's net power is negative\nwhile still keeping blocks that use power functional.
1-6.arc = Arc is a turret that uses power instead of ammo to fire.\n They only drain power when they are firing.\nBatteries are crucial when using arcs.
1-6.onlyarc = This sector bans duo and scorch, try using arcs as the only anti-ground turret to defend.
1-6.setupmore = Try to set up a larger power grid to finish the objectives.\nIt is heavily suggested to connect everything via power nodes,\nas a shared power grid is way easier to maintain and manage.
1-6.flare = Certain types of aerial units prioritize generators!\nAlways build scatters to protect your generators!
# --1-7--
sector.rospule-1-7.name = 1-7\nHeadwaters
sector.rospule-1-7.description = The headwaters of a flowing stream.\nUse kilns to produce metaglass, make usage of water via pumps.

1-7.countdown = Enemy units approaching in:{0}
1-7.kiln = Research and build a kiln.\nKiln is an another crafting structure that makes metaglass.\nAlways check the [accent]core database[] to know what it takes to make a kiln function successfully.
1-7.pump = Research the mechanical pump. Pumps can be put on water tiles to steadily output water.\nWater is a fluid resource.
1-7.conduit = To transport fluid resources, research and use conduits in the liquid tab.\nTurrets supplied with water fire faster.
# --1-8--
sector.rospule-1-8.name = 1-8\nNonfreezing Lake
sector.rospule-1-8.description = This place is closer to warmer sections.\nA big round lake that never freezes lies here.\nResources are scarcer than previous sectors.\nTry using pumps to boost your drills to make them mine faster.

1-8.waterdrill = Pneumatic drills yield ores way faster when supplied with water.\n\n Always try to research anything available when landing into a new sector.\nHail is a long range anti-ground turret that uses graphite.
# --1-9--
sector.rospule-1-9.name = 1-9\nGusty Canyons
sector.rospule-1-9.description = Multiple rivers flow through this sector, forming into complex terrain.\nUse menders to repair damaged blocks.\nProduce pyratite as advanced ammo for hails.\n「[salmon]Guardian Presence[white]」

1-9.mender = Menders use power and automatically repair damaged structures nearby.
1-9.pyratite = Pyratite Mixer is a complicated crafting structure that makes pyratite.\nPyratite is highly flammable, beware of combustion.
# --1-10--
sector.rospule-1-10.name = 1-10\nDisadvantage
sector.rospule-1-10.description = The previous sectors' captures aroused enemy's attention.\nAn immense enemy unit force is heading directly to reclaim control of these sectors.\nA tough fight is estimated in the chilling valley's exit.\nPrepare for the worst and survive from the flooding attacks at all cost.\n「[scarlet]⚠Massive Enemy Offense⚠[]」

1-10.battle = This is a massive offense sector.\nEnemy units come in nonstop waves that get stronger by time.\nProtect the core [accent]at all costs[].
1-10.countdown = Enemy offense begins in: {0}!
1-10.survive = Survive from the massive enemy attacks
1-10.enemyescalating = [salmon]WARNING\n⚠Enemy onslaught intensifying⚠[]
1-10.enemyescalating2 = [scarlet]WARNING\n⚠ENEMY ONSLAUGHT INTENSIFYING⚠[]
# --2-1--
sector.rospule-2-1.name = 2-1\nTransition Section
sector.rospule-2-1.description = Closer to warmer areas, the chilling valley's exit leads to a tight sandy passage.\nUse silicon smelters to refine silicon from sand and coal.

2-1.silicon = Wip
# --2-2--
sector.rospule-2-2.name = 2-2\nScrapyard
sector.rospule-2-2.description = Remnants of several large structures lie here.\nNo enemy patrols detected around this sector.\nProduce enough silicon to depart further.\n「[accent]Production Sector[white]」

2-2.gather = This sector does not have natural sand.\nUse pulverizers to make sand from scrap.\nProduction sectors don't have any enemies. \n[accent]Solely focus on item production to complete the objectives.
# --2-3--
sector.rospule-2-3.name = 2-3\nKarst Landscape
sector.rospule-2-3.description = A sector with moderate enemy amounts.\nWaters eroded the walls and turned this valley into a beautiful scenery.\nSome advanced units are coming to this sector.\nSet up stronger defenses.\n「[salmon]Guardian Presence[white]」

2-3.solar = Solar panels constantly generate power with no requirements.\nTheir power outputs will be affected by day and night cycle.
# --2-4--
sector.rospule-2-4.name = 2-4\nInitial Conflict
sector.rospule-2-4.description = Enemy bases detected in this sector.\nStart constructing units to attack the enemies proactively.\nDestroy the enemy cores to take them down.

2-4.groundfactory = Sometimes the initial structures aren't perfect.\nClean up by rearranging the messy conveyors.\nResearch and construct a [accent]ground factory[].
2-4.makedagger = Research and produce a dagger unit from the ground factory.\n\nClick on the ground factory and select the dagger icon to construct.\nMaking units also requires resources.
2-4.makemoredagger = This is a sector with enemy bases, strong offense power is needed.\nMake more daggers.
2-4.switch = Try constructing a crawler. \nEither select the existing factory and switch it to crawler production,\nor build another ground factory.
2-4.enemycountdown = Enemy attack begins in:{0}
2-4.command = Units need to be commanded to attack.\nHold [accent]shift[]on your keyboard/press the according button at the bottom left of your screen on your phone to enter the command mode.\nHold and drag to select units in an area.\nUse [accent]RMB[]/tap on your screen to make movement and attack orders to selected units. 
2-4.attack = Use command mode to move the units and attack the enemy base.\nNecessary sacrifices may be needed to take down the base.\nDon't forget to keep your ground factories running.
2-4.warn = In an attack sector, enemy waves are infinite.\nTo capture the sector, take out [accent]all enemy cores[] as soon as possible.
2-4.wave = Enemies approaching in 2 minutes. Set up defenses like on previous sectors.
# --2-5--
sector.rospule-2-5.name = 2-5\nAncient Rampart
sector.rospule-2-5.description = During old times, several conflicts took place here.\nA frontier rampart was set up for defense, reduced into scraps nowadays.\nMelt scrap into slag and use it as liquid ammo for the wave turret.

2-5.wave = Wave turrets use [accent]liquids[] as ammo, use melters to make slag from scrap.\nSlag is a type of liquid.
# --2-6--
sector.rospule-2-6.name = 2-6\nTributary
sector.rospule-2-6.description = Traveling through the dark sand valley, a long river flows through this sector.\nAdvanced generator unlocked, capable of generating more power.\nRospule is getting night times, solar panels are [accent]less efficient[] now.\n「[salmon]Guardian Presence[]」\n「[unlaunched]Night Times[]」

2-6.synergy = Wave turrets loaded with water can apply the wet status to enemies.\nArcs deal [accent]higher damage[] to wet enemies.\nGround units are also inflicted with wet when stepping on water tiles.
# --2-7--
sector.rospule-2-7.name = 2-7\nMicro Outpost
sector.rospule-2-7.description = A set of multiple enemy bases blocks the way to proceed.\nUse air factory to produce flares to take out the cores.

2-7.unitcap = A maximum of [accent]8[] units of the [accent]same type[] can be amassed simultaneously.\nThe unit capacity can be increased in later sectors.
# --2-8--
sector.rospule-2-8.name = 2-8\nOutbreak Incubator
sector.rospule-2-8.description = Once a gigantic facility that produces synthesised bioproducts. \nDuring the old war, this place was abandoned, the spores went out and spread widely.\nRetake the ancient biomass technologies.\nScanners detected only air units in the upcoming attacks.\nSurvive without scatter's assistance.

2-8.spore = Spore pods can be produced from cultivators.\nSimilar to coals, spore pods are highly flammable and can be used as fuel for generators.\nSpore press makes oil from spore pods.
2-8.ban = This sector [accent]bans scatter[] as anti-air defenses.\nTry to find other substitutes to fend off agile aerial units.
# --2-9--
sector.rospule-2-9.name = 2-9\nExhausted Quarry
sector.rospule-2-9.description = Mass extractions of this sectors' ore resources resulted in the exhaustion of copper and lead.\nProduce monos to drill the basic resources automatically.\n[accent]Insectoid units[] detected, capable of directly walking through thin walls.\n「[salmon]Guardian Presence[white]」

2-9.mono = Monos are aerial units that cannot attack.\nThey have mining beams that are capable of gathering copper and lead, sending them into the core [accent]automatically[].\nRepair points can repair damaged ally units.
# --2-10--
sector.rospule-2-10.name = 2-10\nRetaliation
sector.rospule-2-10.description = The recent sectors' captures completely irritated the enemies.\nThe destruction of their cores has resulted in them sending a huge wave of retaliation units to retake previous sectors.\nIt must be stopped before the wave succeeds.\nPrepare for an immense battle at the foot of the mountains.\n「[scarlet]⚠Massive Enemy Offense⚠[white]」

2-10.countdown = Enemy offense begins in: {0}!
2-10.defend = Protect the core [accent]AT ALL COST[]!
2-10.survive = Survive from the massive enemy attacks
2-10.threat = [scarlet]--[]--\n--Incoming Transimission--\n\n\n{We}--{Will}--{Never}--{Forget}--{What}--{You}--{Have}--{Done}[]
# --3-1--
sector.rospule-3-1.name = 3-1\nMinefield
sector.rospule-3-1.description = During old wars , a vast minefield was deployed at the entrance of the mountains.\nRepair them as defense against enemies.\nAll turrets are unavailable , try to survive using shock mines and produced units only.

3-1.thermal = Thermal generators are capable of constantly generating power when placed on thermal tiles.
3-1.repair = Hold [accent]B[] on your keyboard when dragging quickly repair all derelict structures in the selected area.\nHold [accent]B[] when selecting also help plan rebuild previously destroyed buildings in the selected area. 
3-1.banned = This sector have [accent]every turret banned[].\nRepair the derelict shock mines to repel enemy ground units.\n[accent]Dagger[] units'weapons are capable of hitting aerial targets.
# --3-2--
sector.rospule-3-2.name = 3-2\nSharp Crevice
sector.rospule-3-2.description = Deeper into the mountains, spaces getting tighter in the crevice.\nTitanium ores detected. Use [accent]pneumatic drills[] to mine titanium.\n「[unlaunched]Night Times[white]」

3-2.armor = Stronger enemy units have higher [accent]armor[].\n[accent]Armor[] directly reduce the damage taken.\nTurrets like  which each bullet having low damage\nwill be [accent]way less effective[] against them.
# --3-3--
sector.rospule-3-3.name = 3-3\nLeeward Side
sector.rospule-3-3.description = The ridge blocked the gales on the other side.\nThis mountainside's resources are scarce and far away from estimated landing area.\nMonos are dispatched help gather basic resources.\nA higher level core upgrade is available.\n「[salmon]Guardian Presence[white]」

3-3.titabelt = Titanium Conveyors travels items faster than normal conveyors.
3-3.core = Once there are enough resource stored, an upgrade to Core:Foundation is available.\nDirectly place the foundation core upon the shard core's location to upgrade it.\nFoundation core has higher hitpoint, more item storage and increased unit capacity than a shard core.
# --3-4--
sector.rospule-3-4.name = 3-4\nGiant Dam
sector.rospule-3-4.description = A giant Gravity Dam was established ages ago.\nEnemies took over the region and set up defenses across the dam.\nReconstruct the dagger units into stronger maces to destroy enemy defenses.\n「[unlaunched]Night Times[white]」

3-4.enemy = Enemies approaching in: {0}
3-4.recons = The [accent]Additive Reconstructor[]\nupgrades tier 1 units to tier 2\nusing silicon and graphite.\n\n[accent]Research and reconstruct\n[]a[accent] dagger[] to a[accent] mace[].
# --3-5--
sector.rospule-3-5.name = 3-5\nRusty Railtrack
sector.rospule-3-5.description = A long railway was set with unknown purpose before.\nSensors detected enemies are splitting into [accent]2 troops[] trying to siege the sector.\n[accent]Naval unit[] presence also detected.\nSecure the sector with great caution ,use [accent]salvo[] turrets to fend off enemies.

3-5.multispawn = This sector have [accent]2 active enemy spawn[] simultaneously.\nSalvo is a turret that uses [accent]decent amount[] of ammo to burst fire strong bullet streams.
# --3-6--
sector.rospule-3-6.name = 3-6\nHotsprings
sector.rospule-3-6.description = Strong thermals from underground erupted hotsprings.\nScarcity in coals.\nUse salvo and parallax turrets to fend off enemies.\n「[salmon]Guardian Presence[white]」
# --3-7--
sector.rospule-3-7.name = 3-7\nObservatory
sector.rospule-3-7.description = A flat space near the summit.\nOnce there was an observatory used for watching stars , abandoned.\nEnemies took over this relic and built a base away from ground roads.\nHeavy anti-air defenses detected.\nProduce [accent]Novas[] to [accent]boost across[] the terrain to launch a surprise attack.

3-7.nova = Nova units are capable of boosting accross terrains and assisting building.\nProduce several novas.
3-7.boost = Enter [accent]command mode[] and select the novas.\nPress [accent]Boost[] in command mode panel to let novas boost.\nBoosting units count as air units , but [accent]cannot fire[].\nFollow the arrows to launch a surprise attack.
3-7.land = Press [accent]Move[] in command mode panel to let novas land.\nAfter landing, they are counted as standard ground units.\nDestroy the enemy base.
# --3-8--
sector.rospule-3-8.name = 3-8\nPetroleum Chasm
sector.rospule-3-8.description = Shales are rich in petroleum resources here.\n[accent]Coals are absent.[] Centrifuge coals from oils.\n[accent]Advanced graphite processing[] technique unlocked.\n[accent]Polys[] are deployed to assist for sector production.\n「[accent]Production Sector[white]」

3-8.poly = Poly units are [accent]omnipurpose[] units.\nCapable of mining ores, repairing blocks, rebuilding structures, \nassisting players, also equipped a missile launcher, can heal nearby units.
# --3-9--
sector.rospule-3-9.name = 3-9\nCollapsed Massifs
sector.rospule-3-9.description = During an earthquake, a landslide covered some derelicts beneath.\nLarger quantites of enemies are approaching.\nDo not underestimate them.\nResources are scattered, hard to route to core, [accent]polys[] will be helpful here.\n「[salmon]Guardian Presence[white]」

3-9.status = Strongly suggested to turn on block status.\nEnter settings - graphics - display block status.\n[acid]Green[] Diamond means the block is working properly.\n[accent]Yellow[] Diamond means this block doesn't have output(Full and ready).\n[salmon]Red[] Diamond means it lacks prerequisites and has stopped working.\nUsing block status will make managing factories [accent]way easier[].
# --3-10--
sector.rospule-3-10.name = 3-10\nDilemma
sector.rospule-3-10.description = Looks like enemies have taken one step ahead this time.\nAn enormous large troop of enemy units have arrived at the sandy karst in advance.\nThey are indeed going to take revenge this time.\nAnother troop of enemy reinforcement is approaching from rear.\nPrepare for a terrible pincer attack from 2 sides.\n「[scarlet]⚠Massive Enemy Offense⚠[white]」

3-10.threat = [scarlet]--[]--\n--Incoming Transimission--\n\n\n{Do}--{Not}--{Think}--{Advantage}--{Is}--{On}--{Your}--{Side}[]
3-10.countdown = Enemy offense begins in: {0}
3-10.estimate = Estimated enemy rear attack reinforcement arrives in: {0}
3-10.survive = Survive......
# --4-1--
sector.rospule-4-1.name = 4-1\nWavecut Cliff
sector.rospule-4-1.description = Strong waves of sea eroded the shores and forming a sharp steep cliff.\nLarger quantites of enemy naval units are approaching.\nA larger version of drill unlocked.

4-1.laserdrill = Laser drill is a 3x3 drill that provides even faster drilling output.\nIt requires power to function.\nWater cooling provides an even stronger efficiency.
# --4-2--
sector.rospule-4-2.name = 4-2\nTidal Flat
sector.rospule-4-2.description = At the downstreams a narrow delta lies here with damp grounds.\nNaval units are coming, use containers to work as [accent]ammo buffer[] and use them to [accent]increase core storage capacity[].\nLearn the usage of [accent]unloaders[].

4-2.container = Containers are capable of [accent]store different types of[] items.\nUnloaders should be used to retrieve the items out of the containers.\nUnloaders will unload items of selected type from its [accent]adjacent[] blocks.
4-2.unloader = Unloaders are like gates that transfer items [accent]instantly[].\n[unlaunched]Unselected[] unloaders will unload [unlaunched]every type[] of item the [accent]adjacent[] blocks have.\nPlacing unloaders adjacent to two same blocks to transfer inputs mutually.
4-2.core = Place containers [accent]adjacent[] to core can increase the core's capacity.\nUnloading from these containers also unload items from the core.\n[accent]Only containers with direct contact with core can increase the capacity.[]
# --4-3--
sector.rospule-4-3.name = 4-3\nSeaside Promenade
sector.rospule-4-3.description = Follow along the coastlines, a narrow sandy passage provided a path for enemies to approach towards estimated core landing position.\nResources are hard to gather and transfer across islands.\n[accent]Ripple[] turrets will help aid long-range firepower.\n「[salmon]Guardian Presence[white]」

4-3.ripple = Ripple turret is like hail that throws projectile at a long distance.\n--[accent][High inaccuracy][]--\n--[accent][Targets Ground][]--
# --4-4--
sector.rospule-4-4.name = 4-4\nArchipelago Takeover
sector.rospule-4-4.description = Several islands are under enemy control for now.\nThese bases have [accent]fatal weakspots[].\nConstruct naval units and horizons to take out them.\n「[unlaunched]Night Times[white]」

4-4.countdown = Enemy units production activating in: {0}
4-4.air = Enemy ripples and lancers are everywhere......\nWait, where are the anti-air turrets?
4-4.power = It seems that placing batteries in an unsafe spot is not a good choice......
4-4.naval = So many parallax! Sadly, it seems that they don't know how to aim at ships......
# --4-5--
sector.rospule-4-5.name = 4-5\nForsaken Shipyard
sector.rospule-4-5.description = Once one of the largest shipyard in the seas, abandoned.\nThis pier has [accent]no titanium ores around at all[].\nConstruct [accent]Separators[] to refine titanium out of scrap.\n「[accent]Production Sector[white]」\n「[unlaunched]Night Times[white]」

4-5.schematic = To save an schematic , press and hold [accent][F][] on the keyboard while dragging.\nThe selected area can be saved as a schematic.\nSchematics will be useful to quickly set up factories or turrets.
4-5.titanium = This sector has [accent]no titanium[]!\nThe titaniums stored in core resources are [accent]limited[]. Spend wisely.\nUse [accent]separators[] to get titanium from slag.\nDerelicts can be deconstructed to retrieve titanium as well.
4-5.pulsar = Pulsar is a ground unit capable of doing multiple things , same as [accent]poly[].\nThey will automatically boost when they are mining , assisting or rebuilding.
