3-7.boost = Enter [accent]command mode[] and select the novas.\nPress the [accent]Boost[]ŅĀä option in command mode panel to let novas boost.\nBoosting units count as air units , but [accent]cannot fire[].\nFollow the arrows to launch a surprise attack.
