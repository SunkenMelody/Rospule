sector.rospule-4-2.description = At the downstreams a narrow delta lies here with damp grounds.\nNaval units are coming, use containersпЎҘ to work as [accent]ammo buffer[] and use them to [accent]increase core storage capacity[].\nLearn the usage of [accent]unloaders[]пЎӨ.

4-2.container = ContainersпЎҘ are capable of [accent]store different types of[] items.\nпЎӨUnloadersпЎӨ should be used to retrieve the items out of the containers.\nUnloaders will unload items of selected type from its [accent]adjacent[] blocks.
4-2.unloader = UnloadersпЎӨ are like gates that transfer items [accent]instantly[].\n[unlaunched]Unselected[] unloaders will unload [unlaunched]every type[] of item the [accent]adjacent[] blocks have.\nPlacing unloaders adjacent to two same blocks to transfer inputs mutually.
4-2.core = Place containers [accent]adjacent[] to core can increase the core's capacity.\nUnloading from these containers also unload items from the core.\n[accent]Only containers with direct contact with core can increase the capacity.[]
# --4-3--
sector.rospule-4-3.name = 4-3\nSeaside Promenade
sector.rospule-4-3.description = Follow along the coastlines, a narrow sandy passage provided a path for enemies to approach towards estimated core landing position.\nResources are hard to gather and transfer across islands.\n[accent]RippleпЎ—[] turrets will help aid long-range firepower.\nгҖҢ[salmon]Guardian Presence[white]гҖҚ

4-3.ripple = RippleпЎ— turret is like hailпЎһ that throws projectile at a long distance.\n--[accent][High inaccuracy][]--\n--[accent][Targets Ground][]--
# --4-4--
sector.rospule-4-4.name = 4-4\nArchipelago Takeover
sector.rospule-4-4.description = Several islands are under enemy control for now.\nThese bases have [accent]fatal weakspots[].\nConstruct naval unitsпҹ§пһҲ and horizonsпҹө to take out them.\nгҖҢ[unlaunched]Night Times[white]гҖҚ

4-4.countdown = Enemy units production activating in: {0}
4-4.air = Enemy ripples and lancers are everywhere......\nWait, where are the anti-air turrets?
4-4.power = It seems that placing batteries in an unsafe spot is not a good choice......
4-4.naval = So many parallax! Sadly, it seems that they don't know how to aim at ships......
# --4-5--
sector.rospule-4-5.name = 4-5\nForsaken Shipyard
sector.rospule-4-5.description = Once one of the largest shipyard in the seas, abandoned.\nThis pier has [accent]no titanium ores around at all[].\nConstruct [accent]Separators[]пўі to refine titanium out of scrap.\nгҖҢ[accent]Production Sector[white]гҖҚ\nгҖҢ[unlaunched]Night Times[white]гҖҚ

4-5.schematic = To save an schematic , press and hold [accent][F][] on the keyboard while dragging.\nThe selected area can be saved as a schematic.\nSchematics will be useful to quickly set up factories or turrets.
4-5.titanium = This sector has [accent]no titanium[]!\nThe titaniums stored in core resources are [accent]limited[]. Spend wisely.\nUse [accent]separators[]пўі to get titanium from slag.\nDerelicts can be deconstructed to retrieve titanium as well.
4-5.pulsar = Pulsar is a ground unit capable of doing multiple things , same as [accent]poly[].\nThey will automatically boost when they are mining , assisting or rebuilding.
