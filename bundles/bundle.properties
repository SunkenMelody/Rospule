sector.rospule-4-2.name = 4-2\nTidal Flat
sector.rospule-4-2.description = A narrow delta lies at the downstreams with damp grounds.\nNaval units are coming, use containers’Īź to work as [accent]ammo buffer[] and use them to [accent]increase core storage capacity[].\nLearn the usage of [accent]unloaders[]’Īż.

4-2.container = Containers’Īź are capable of [accent]storing different types of[] items.\n’ĪżUnloaders’Īż should be used to retrieve the items out of the containers.\nUnloaders will unload items of the selected type from the blocks [accent]adjacent[] to them.
