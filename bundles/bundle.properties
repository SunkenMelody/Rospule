planet.rospule-rospuleball.name = Rospule

# --Map texts--
# --1-1--
sector.rospule-1-1.name = 1-1\nEverything Begins
sector.rospule-1-1.description = Welcome to [#c5cbff[]]Rospule[], this is a parallel universe of Serpulo. \n[accent]Collect resources[] and [accent]grasp technologies[] to gain footstand.

1-1.mine = Use [unlaunched]W/A/S/D[] to move.\nClick on the [accent]copper ore[] to mine copper.
1-1.research = Open the [accent]tech tree[] and [accent]research[] anything available to proceed.
1-1.place = Click on the production tab and select the [accent]mechanical drill[].\nThen click again in the designated area to place the drill on copper ores.
1-1.conveyor = Drills can [accent]automatically[] mine copper, yet they need [unlaunched]outputs[] to send the resources into the core.\nConstruct a line of conveyors to [accent]connect[] the drill to the core.
1-1.moreconveyor = Place more mechanical drills to speed up the resource extraction.\nMultiple conveyor entries can be merged into one line.
1-1.expand =  Use [unlaunched]W/A/S/D[] to move forward , proceed for further instructions.
1-1.router = [accent]Routers[] can accept inputs and equally distribute items into the rest of the directions.\n Placing adjacent routers may cause [unlaunched]backflow[].
1-1.junction = [accent]Junctions[] act as crossroads for two conveyor lines.\n Notice junctions do not proactively distrubute items.
1-1.placeduo = Use automated turrets as defense to fend off enemies.\nPlace 2 [accent]duo[]s.
1-1.feedammo = Turrets like duo need [accent]ammo[]supplies to function.\nUse mechanical drills, conveyors and routers to transfer mined copper into the duo to load it up with ammo.
1-1.supply = Supply turrets with ammo
1-1.enemy = Enemy units approaching in: {0}
1-1.spawnwarning = Enemies spawn in [accent]drop zones[].\nDrop zones have an area of a certain radius.\nWhen a wave starts, anything inside the raidus will be [unlaunched]instantly destroyed[]!
1-1.defend = Now build more duos, supply them with ammo, defend the core and survive until the final wave ends.
# --1-2--
sector.rospule-1-2.name = 1-2\nFrozen Passage
sector.rospule-1-2.description = This chilling place is closer to enemy activities. \nSet up automated defenses to [accent]ward off[] enemy patrols.

1-2.lead = [accent]Lead[] is another crucial resource, same as copper.\nUse the core drone or mechanical drills to mine lead.
1-2.expand = Move forward to proceed.
1-2.sorter = Sorter is a distrubution block that allows item of [accent]the selected type[white] to pass through.\nOther items will be distributed between its sides.\n [unlaunched]Unselected sorters[] distribute every type of item between both sides only.
1-2.isorter = Inverted Sorters are pretty similar to sorters,\nbut they distribute selected items to both sides and let other items pass through.\n [unlaunched]Unselected inverted sorters[] pass every type of item straight through.
1-2.wall = Copper walls are useful to [accent]absorb enemy firepower[], making turrets [unlaunched]safer[] from being destroyed.
# --1-3--
sector.rospule-1-3.name = 1-3\nTaiga
sector.rospule-1-3.description = A massive frozen pinewood forest lies here.\nHostile [accent]aerial units[] detected in the approaching attack.\n「[salmon]Guardian Presence[]」

1-3.bridge = [accent]Bridge conveyors[] can move items [unlaunched]across[] terrain walls or solid blocks.\n Try using bridge conveyors to move lead out of the cave.\n Bridge conveyors can be [unlaunched]manually configured[] to connect with each other.
1-3.derelict = Derelict blocks are [unlaunched]abandoned neutral structures[].\n[accent]Retrieve[] them for resources or [accent]repair[] them to restore functionality.\n Click on a derelict structure to repair it.
1-3.bridge2 = Bridge conveyors output simultaneously into [accent]multiple directions[].\nBridge conveyor's input can also accept multiple inputs simultaneously.
1-3.ammofeed = Supply turrets with ammo/
1-3.buildscatter = [accent]Aerial units[] detected. Turrets like duo cannot precisely hit agile aerial targets.\nConstruct [accent]scatter[]turrets for anti-air defenses.\n⚠ Scatter can only target and hit [accent]air[white] units.
1-3.stuffammo = [unlaunched]Always pay attention to turret's stats[white].\nFrequently check the [accent]core database[white] to know what items are required for turret ammo.\n[accent]Find the correct ammo type[white] to supply scatters.
1-3.guardian = Guardian units are [accent]elite units[white] with a unique health bar.\nThey have slightly [accent]higher stats[white] than their normal counterparts.\n Pay attention to the Guardian warning to prepare proper defenses.
# --1-4--
sector.rospule-1-4.name = 1-4\nLowlands
sector.rospule-1-4.description = A low-altitude riverbed with fossilized [accent]coals[] nearby.\nGather coal and start to learn the usage of [accent]graphite press[].

1-4.minecoal = [accent]Coal[] is another kind of basic resource.\nUse drills to mine and gather coal.
1-4.buildpress = Research and place a [unlaunched]graphite press[white].\nGraphite press is the first crafting tab structure that [accent]produces[white] graphite.
1-4.graphiteprod = To make graphite press working, it needs constant input of coals.\n Use distribution blocks to send coal into the graphite press.\nGraphite will be produced automatically once there are enough coal stored in graphite press.\nNotice that the graphite press have limited graphite storage, use conveyors to make an output!
1-4.pneumatic = Once gained access to graphite, an [accent]upgraded verison[] of the mechanical drill is available to build.\n It costs [accent]more copper[white] and graphite to build than mechanical drills.
1-4.duoammo = Always check the [accent]core database[white]! Turrets like duo can also use graphite as ammmo.\n Duos fire [unlaunched]more powerful[] projectiles when using graphite as ammo.
1-4.findspawn = This map has more than one place that looks like it could have a [accent]drop zone[].\n Move around with the core drone to scout the area and find the exact drop zone's position.
# --1-5--
sector.rospule-1-5.name = 1-5\nCrossing Point
sector.rospule-1-5.description = Two different paths cross together, forming into [unlaunched]an unpredictable terrain[].\nLearn to use [accent]new turrets[], figure out enemy paths and successfully defend the sector.

1-5.scorch = [accent]Scorch[] is a new turret that takes graphite to build.\nIt uses coal as ammo and is [accent]very effective at close range[].\n[red]⚠ Handle with care! All buildings with coal[white][red] will start a fire when they are destroyed![white]
1-5.underflow = [accent]Underflow Gate[] always prioritizes outputting items to the sides.\n If both sides are [unlaunched]full/clogged[], outputs to the front.
1-5.overflow = [accent]Overflow Gate[] always prioritizes outputting items forward.\n If both sides are [unlaunched]full/clogged[], outputs to the sides.
# --1-6--
sector.rospule-1-6.name = 1-6\nSnowpiled Coalfield
sector.rospule-1-6.description = Ages ago, the remains of rich plants near the riverbed transformed into gigantic patches of coal.\nStart using coal to generate power and learn how to use the arc turret.\n「[salmon]Guardian Presence[]」

1-6.combustion = Combustion generator requires constant coal intake and can [accent]produce power[].\nPower is an invisible resource that uses [accent]power nodes[] to conduct.
1-6.node = Power nodes are like bridge conveyors that can be connected to other power blocks.\n [accent]Power blocks interconnected by nodes share the same power grid[].
1-6.morecombustion = Place more combustion generators, supply them with coal to proceed.\nThis increases the power grid's total power production.
1-6.enoughpower = Amass +240 power/sec (4x ) in one power grid
1-6.battery = Batteries [accent]store power[] when the power is in abundance.\nThey should be connected into a power grid by power nodes.
1-6.enoughstorage = Amass 4000 power storage (1x full) in one power grid
1-6.moremoremore = Amass +480 power/sec (8x ) in one power grid\nAmass 20000 power storage (5x full) in one power grid
1-6.batterystore = Batteries drain stored power when the grid's net power is negative\nwhile still keep blocks that use power functional.
1-6.arc = Arc is a turret that [accent]uses power[] instead of ammo to fire.\n Arcs only drain power when firing.\n [unlaunched]Batteries[] [unlaunched]are crucial when using arcs[].
1-6.onlyarc = This sector bans duo and scorch, try use arcs as the [accent]only anti-ground turret[] to defend.
1-6.setupmore = Try to set up a larger power grid to finish the objectives.\n It is heavily suggested to connect everything via power nodes,\nas a shared power grid is way easier to maintain and manage.
1-6.flare = Certain types of aerial units prioritize generators!\nAlways build scatters to protect your power production blocks!
# --1-7--
sector.rospule-1-7.name = 1-7\nHeadwaters
sector.rospule-1-7.description = The headwaters of a flowing stream.\nUse [accent]kilns[] to produce metaglass, make usage of water via pumps.

1-7.countdown = Enemy units approaching in:{0}
1-7.kiln = [unlaunched]Research and build a kiln[].\nKiln is another crafting structure that makes metaglass.\nAlways check the [accent]core database[white] to know what it takes to make a kiln function successfully.
1-7.pump = Research the [accent]mechanical pump[]. Pumps can be put on water tiles to steadily output water.\n Water is a fluid resource.
1-7.conduit = To transport fluid resources, [unlaunched]research and use [accent]conduits[] in the liquid tab.\n Turrets supplied with water [unlaunched]fires faster[].
# --1-8--
sector.rospule-1-8.name = 1-8\nNonfreezing Lake
sector.rospule-1-8.description = This place is closer to warmer sections.\nA big round lake that never freezes lies here.\n[accent]Resources are scarcer than previous sectors[].\nTry using pumps to boost the drills to make them mine faster.

1-8.waterdrill = Pneumatic drills yield ores way faster when [unlaunched]supplied with water[].\n Always try to research anything available when landing into a new sector.\n [accent]Hail[] is a long range anti-ground turret that uses graphite.
# --1-9--
sector.rospule-1-9.name = 1-9\nGusty Canyons
sector.rospule-1-9.description = Multiple rivers flow through this sector, forming into a complex terrain.\nUse menders to repair damaged blocks.\nProduce pyratite as advanced ammo for hails.\n「[salmon]Guardian Presence[]」

1-9.mender = Menders use power and [accent]automatically repair damaged structures nearby[].
1-9.pyratite = Pyratite Mixer is a complicated crafting structure that makes pyratite.\n[red]⚠ Pyratite is highly flammable, beware of combustion[].
1-9.deepwater = Deep waters have a darker blue color.\n Ground units [accent]cannot bypass[] them.\ Structures can't be built on top of them as well.
# --1-10--
sector.rospule-1-10.name = 1-10\nDisadvantage
sector.rospule-1-10.description = The previous sectors' captures aroused enemy's attention.\n[salmon]An immense enemy unit force[] is heading directly to reclaim control of these sectors.\nA tough fight is estimated in the chilling valley's exit.\n[salmon]Prepare for the worst[] and survive from the flooding attacks [salmon]at all costs[].\n「[scarlet]⚠Massive Enemy Offense⚠[]」

1-10.battle = This is a massive offense sector.\nEnemy units come in [salmon]nonstop waves[] that gets stronger by time.\nProtect the core [accent]at all cost[white].
1-10.countdown = ⚠Enemy offense begins in: {0}
1-10.survive = Survive from the massive enemy attacks
1-10.enemyescalating = [salmon]WARNING\n⚠Enemy onslaught intensifying⚠[]
1-10.enemyescalating2 = [scarlet]WARNING\n⚠ENEMY ONSLAUGHT INTENSIFYING⚠[]
1-10.win = [accent]Chapter 1 Finished![]
# --2-1--
sector.rospule-2-1.name = 2-1\nTransition Section
sector.rospule-2-1.description = Closer to warmer areas, the chilling valley's exit leads to a tight sandy passage.\nUse [accent]silicon smelters[] to refine silicon from sand and coal.

2-1.silicon = Silicon is a crucial resource with multiple usages.\nNumerous advanced structures all require silicon to build.\nSilicon ammo also grants homing ability for turrets.\n [accent]It's always a good choice to mass produce silicon even not in shortages[].
# --2-2--
sector.rospule-2-2.name = 2-2\nScrapyard
sector.rospule-2-2.description = Remnants of once several large structures detected.\n[accent]No enemy patrols detected around this sector[].\nProduce enough silicon to depart further.\n「[accent]Production Sector[]」

2-2.gather = This sector [accent]does not have natural sand[].\nUse [accent]pulverizers[] to make sand from scrap.\nProduction sectors don't have any enemies. \n[accent]Solely focus on item production to complete the objectives.
# --2-3--
sector.rospule-2-3.name = 2-3\nKarst Landscape
sector.rospule-2-3.description = A sector with moderate enemy amounts.\nWaters eroded the walls and turned this valley into a beautiful scenery.\nSome [accent]advanced units[] are coming to this sector.\nSet up stronger defenses.\n「[salmon]Guardian Presence[]」

2-3.solar = Solar panels constantly generate power with no requirements.\n  Notice their power outputs will be affected by day and night cycle.
# --2-4--
sector.rospule-2-4.name = 2-4\nInitial Conflict
sector.rospule-2-4.description = [salmon]Enemy bases[] detected in this sector.\nStart constructing units to attack enemies proactively.\n[accent]Destroy the enemy cores[] to take them down.

2-4.groundfactory =  Sometimes the initial structures aren't perfect.\nClean up by rearranging the messy conveyors.\nResearch and construct a [accent]ground factory[].
2-4.makedagger = Research and produce a dagger unit from the [accent]ground factory[].\n\nClick on the ground factory and select the dagger icon to construct.\n Making units also requires resource inputs.
2-4.makemoredagger = This is a sector with enemy bases, strong offense power is needed.\nMake more daggers.
2-4.switch = Try constructing a crawler. \nEither select the existing factory and switch it to crawler production,\nor build another ground factory.
2-4.enemycountdown = Enemy attack begins in:{0}
2-4.command = Units need to be commanded to attack.\nHold [accent]shift[]on keyboard to enter command mode.\nUse [accent]LMB[] to drag and select the units.\nUse [accent]RMB[] to make movement and attack orders to selected units. 
2-4.attack = Use command mode to move the units and attack the enemy base.\n Necessary sacrifices may be needed to take down the base.\nDon't forget to keep ground factories running.
2-4.warn =  In an attack sector, enemy waves goes up infinitely.\nTo capture the sector , take out [accent]all enemy cores[] as soon as possible.
2-4.wave = Enemies approaching in 2 minutes. Set up defenses like on previous sectors.
# --2-5--
sector.rospule-2-5.name = 2-5\nAncient Rampart
sector.rospule-2-5.description = During old times, several conflicts took place here.\nA frontier rampart was set up for defense, reduced into scraps nowadays.\nMelt scrap into slag and use it as liquid ammo for wave turret.

2-5.wave = Wave turrets use [accent]liquids[] as ammo, use melters to make slag from scrap.\nSlag is a type of liquid.
# --2-6--
sector.rospule-2-6.name = 2-6\nTributary
sector.rospule-2-6.description = Traveling through the dark sand valley, a long river flows through this sector.\n[accent]Advanced generator[] unlocked, capable of generating more power.\nRospule is getting night times, solar panels are [accent]less efficient[] now.\n「[salmon]Guardian Presence[]」\n「[unlaunched]Night Times[]」

2-6.synergy = Wave turrets loaded with water can apply the wet status to enemies.\nArcs deals [accent]higher damage[] to wet enemies.\n Ground units are also inflicted with wet when stepping on water tiles.
# --2-7--
sector.rospule-2-7.name = 2-7\nMicro Outpost
sector.rospule-2-7.description = A set of multiple enemy bases blocked the way to proceed.\nUse air factory to produce flares to take out the cores.

2-7.unitcap = A maximum of [accent]8[] units of the [accent]same type[] can be amassed simultaneously.\n The unit capacity can be increased in later sectors.
# --2-8--
sector.rospule-2-8.name = 2-8\nOutbreak Incubator
sector.rospule-2-8.description = Once a gigantic facility that produces synthesised bioproducts.\nDuring the old war ,this place was abandoned, the spores went out and spread widely.\n[accent]Retake the ancient biomass technologies[].\nScanners detected only air units in the upcoming attacks.\n[accent]Survive without scatter[][accent]'s assistance[].

2-8.spore = Spore pods can be produced from cultivators.\nSimilar to coals, spore pods are [accent]highly flammable[] and can be used as fuel for generators.\n Spore press makes oil from spore pods.
2-8.ban = This sector [accent]bans scatter[] as anti-air defenses.\nTry to find other substitutes to fend off agile aerial units.
# --2-9--
sector.rospule-2-9.name = 2-9\nExhausted Quarry
sector.rospule-2-9.description = Mass extractions of this sectors' ore resources resulted in the exhaustion of copper and lead.\nProduce monos to drill the basic resources automatically.\n[accent]Insectoid units[] detected, capable of directly walking through thin walls.\n「[salmon]Guardian Presence[]」

2-9.mono = Monos are aerial units that cannot attack.\nThey have mining beams that are capable of gathering copper and lead, sending them into the core [accent]automatically[].\nRepair points can repair damaged ally units.
# --2-10--
sector.rospule-2-10.name = 2-10\nRetaliation
sector.rospule-2-10.description = The recent sectors' captures completely irritated the enemies.\nThe destruction of their cores has resulted in them [salmon]sending a huge wave of retaliation units[] to retake previous sectors.\nIt must be stopped before the units succeed.\n[salmon]Prepare for an immense battle at the foot of the mountains[].\n「[scarlet]⚠Massive Enemy Offense⚠[]」

2-10.countdown = ⚠Enemy offense begins in: {0}
2-10.defend = Protect the core [accent]AT ALL COST[]!
2-10.survive = Survive from the massive enemy attacks
2-10.threat = [scarlet]--[]--\n--Incoming Transimission--\n\n\n{We}--{Will}--{Never}--{Forget}--{What}--{You}--{Have}--{Done}[]
2-10.win = [accent]Chapter 2 Finished![]
# --3-1--
sector.rospule-3-1.name = 3-1\nMinefield
sector.rospule-3-1.description = During old wars, a vast minefield was deployed at the entrance of the mountains.\n[accent]Repair them[] to use as defense against enemies.\nAll turrets are unavailable , try to survive using shock mines and units only.

3-1.thermal = Thermal generators are capable of [accent]constantly generating power[] when placed on thermal tiles.
3-1.repair = Hold [accent]B[] on the keyboard when dragging to quickly repair all derelict structures in the selected area.\n Hold [accent]B[] when selecting also help plan rebuild previously destroyed buildings in the selected area. 
3-1.banned = This sector has [accent]every turret banned[].\nRepair the derelict shock mines to repel enemy ground units.\n [accent]Dagger[] units'weapons are capable of hitting aerial targets.
# --3-2--
sector.rospule-3-2.name = 3-2\nSharp Crevice
sector.rospule-3-2.description = Deeper into the mountains, spaces are tighter in this crevice.\nTitanium ores detected. Use [accent]pneumatic drills[] to mine titanium.\n「[unlaunched]Night Times[]」

3-2.armor = Stronger enemy units have higher [accent]armor[].\n[accent]Armor[] directly reduces the damage taken.\n Turrets like  with fast firerate but low damage per bullet\nwill be [accent]way less effective[] against them.
# --3-3--
sector.rospule-3-3.name = 3-3\nLeeward Side
sector.rospule-3-3.description = The ridge blocks the gales on the other side.\nThis mountainside's resources are [accent]scarce and far away[] from estimated landing area.\n[unlaunched]Monos are dispatched[] to help gather basic resources.\nA higher level core upgrade is available.\n「[salmon]Guardian Presence[]」

3-3.titabelt = Titanium Conveyors transport items faster than normal conveyors.
3-3.core = Once there are enough resources stored in the core, an upgrade to [accent]Core:Foundation[] is available.\n Directly place the foundation core upon the shard core's location to upgrade it.\n Foundation core has higher hitpoints, more item storage and increased unit capacity than a shard core.
# --3-4--
sector.rospule-3-4.name = 3-4\nGiant Dam
sector.rospule-3-4.description = A giant Gravity Dam was established here ages ago.\nEnemies took over the region and set up defenses across the dam.\nReconstruct the dagger units into stronger [accent]maces[] to destroy enemy defenses.\n「[unlaunched]Night Times[]」

3-4.enemy = Enemies approaching in: {0}
3-4.recons = The [accent]Additive Reconstructor[]\nupgrades tier 1 units to tier 2\nusing silicon and graphite.\n\n[accent]Research and reconstruct\n[]a[accent] dagger[] to a[accent] mace[].
# --3-5--
sector.rospule-3-5.name = 3-5\nRusty Railtrack
sector.rospule-3-5.description = A long railway was set up here with unknown purpose.\nSensors detected enemies are splitting into [accent]2 paths[] trying to siege the sector.\n[accent]Naval unit[] presence detected.\nSecure the sector with great caution ,use [accent]salvo[] turrets to fend off enemies.

3-5.multispawn = This sector has [accent]2 active enemy spawns[] simultaneously.\nSalvo is a turret that uses a [accent]decent amount[] of ammo to shoot bursts of strong bullet streams.
# --3-6--
sector.rospule-3-6.name = 3-6\nHotsprings
sector.rospule-3-6.description = Strong thermals from underground erupted into hotsprings.\n[accent]Sensors detect scarcity in coals[].\nUse salvo and parallax turrets to fend off enemies.\n「[salmon]Guardian Presence[]」
# --3-7--
sector.rospule-3-7.name = 3-7\nObservatory
sector.rospule-3-7.description = A flat space near the summit.\nOnce there was an observatory used for watching stars, now abandoned.\nEnemies took over this relic and built a base away from low grounds.\n[accent]Heavy anti-air defenses detected[].\nProduce [accent]Novas[] to [accent]boost across[] the terrain to [accent]launch a surprise attack[].

3-7.nova = Nova units are capable of boosting accross terrain and assisting building.\nProduce several novas.
3-7.boost = Enter [accent]command mode[] and select the novas.\nPress the [accent]Boost[] option in command mode panel to let novas boost.\nBoosting units count as air units , but [accent]cannot fire[].\nFollow the arrows to launch a surprise attack.
3-7.land = Press [accent]Move[] in command mode panel to let the novas land.\nAfter landing, they are counted as standard ground units.\nDestroy the enemy base.
# --3-8--
sector.rospule-3-8.name = 3-8\nPetroleum Chasm
sector.rospule-3-8.description = Shales are rich in petroleum resource here.\n[accent]Coals are absent.[] Centrifuge coals from oil.\n[accent]Advanced graphite processing[] technique unlocked.\n[accent]Polies[] are deployed to assist for building.\n「[accent]Production Sector[]」

3-8.poly = Poly units are [accent]omnipurpose[] units.\nThey are capable of mining ores, repairing blocks, rebuilding structures, \nassisting players, also equipped a missile launcher, can heal nearby units.
# --3-9--
sector.rospule-3-9.name = 3-9\nCollapsed Massifs
sector.rospule-3-9.description = During an earthquake, a landslide covered some derelicts beneath.\nLarger quantites of enemies are approaching.\n[unlaunched]Do not underestimate them[].\nResources are scattered, hard to route to core, [accent]polies[] will be helpful here.\n「[salmon]Guardian Presence[]」

3-9.status = Strongly suggested to turn on block status.\nEnter settings - graphics - display block status.\n[acid]Green[] Diamond means the block is working properly.\n[accent]Yellow[] Diamond means this block doesn't have outputs(Full and ready).\n[salmon]Red[] Diamond means it lacks prerequisites and has stopped working.\nUsing block status will make managing factories [accent]way easier[].
# --3-10--
sector.rospule-3-10.name = 3-10\nDilemma
sector.rospule-3-10.description = Looks like the enemies have taken one step ahead this time.\n[salmon]An enormous large troop of enemy units[] have arrived at the sandy karst in advance.\nThey are indeed going to take revenge this time.\n[accent]Another troop[] of enemy reinforcement is approaching from rear.\n[salmon]Prepare for a terrible pincer attack from 2 sides[].\n「[scarlet]⚠Massive Enemy Offense⚠[]」

3-10.threat = [scarlet]--[]--\n--Incoming Transimission--\n\n\n{Do}--{Not}--{Think}--{Advantage}--{Is}--{On}--{Your}--{Side}[]
3-10.countdown = ⚠Enemy offense begins in: {0}
3-10.estimate = Estimated enemy rear attack reinforcement arrives in: {0}
3-10.survive = Survive......
3-10.win = [accent]Chapter 3 Finished![]
# --4-1--
sector.rospule-4-1.name = 4-1\nWavecut Cliff
sector.rospule-4-1.description = Strong waves of sea eroded the shores and formed a sharp steep cliff.\nLarger quantites of enemy naval units are approaching.\n[accent]A larger version of drill[] unlocked.

4-1.laserdrill = Laser drill is a 3x3 drill that provides even faster drilling output.\nIt requires power to function.\nWater cooling provides an even stronger efficiency.
# --4-2--
sector.rospule-4-2.name = 4-2\nTidal Flat
sector.rospule-4-2.description = A narrow delta lies at the downstreams with damp grounds.\nNaval units are coming, use containers to work as [accent]ammo buffer[] and use them to [accent]increase core storage capacity[].\nLearn the usage of [accent]unloaders[].

4-2.container = Containers are capable of [accent]storing different types of[] items.\nUnloaders should be used to retrieve the items out of the containers.\nUnloaders will unload items of the selected type from the blocks [accent]adjacent[] to them.
4-2.unloader = Unloaders are like gates that transfer items [accent]instantly[].\n[unlaunched]Unconfigured[] unloaders will unload [unlaunched]every type[] of item the [accent]adjacent[] blocks have.\nPlacing unloaders adjacent to two similar blocks essentially makes them share storage.
4-2.core = Containers [accent]adjacent[] to the core can increase it's capacity.\nUnloading from these containers also unload items from the core.\n[accent]Only containers with direct contact with core can increase the capacity.[]
# --4-3--
sector.rospule-4-3.name = 4-3\nSeaside Promenade
sector.rospule-4-3.description = Following along the coastlines, a narrow sandy passage provided a path for enemies to approach towards the estimated core landing position.\nResources are hard to gather and transfer across islands.\n[accent]Ripple[] turrets will help with long-range firepower.\n「[salmon]Guardian Presence[]」

4-3.ripple = Ripple turret is like hail that throws projectile at a long distance.\n--[accent][High inaccuracy][]--\n--[accent][Targets Ground][]--
# --4-4--
sector.rospule-4-4.name = 4-4\nArchipelago Takeover
sector.rospule-4-4.description = Several islands are under enemy control for now.\nThese bases have [accent]fatal weakspots[].\nConstruct naval units and horizons to take out them.\n「[unlaunched]Night Times[]」

4-4.countdown = Enemy units production activating in: {0}
4-4.air = Enemy ripples and lancers are everywhere......\nWait, where are the anti-air turrets?
4-4.power = It seems that placing batteries in an unsafe spot is not a good choice......
4-4.naval = So many parallaxes! Sadly, it seems that they don't know how to aim at ships......
# --4-5--
sector.rospule-4-5.name = 4-5\nForsaken Shipyard
sector.rospule-4-5.description = Once one of the largest shipyards in the seas, now abandoned.\nThis pier has [accent]no titanium ores around at all[].\nConstruct [accent]Separators[] to refine titanium out of scrap.\n「[accent]Production Sector[]」\n「[unlaunched]Night Times[]」

4-5.schematic = To save a schematic, press and hold [accent][F][] on the keyboard while dragging.\nThe selected area can be saved as a schematic.\nSchematics will be useful to quickly set up factories or turrets.
4-5.titanium = This sector has [accent]no titanium[]!\nThe titaniums stored in core resources are [accent]limited[]. Spend wisely.\nUse [accent]separators[] to get titanium from slag.\nDerelicts can be deconstructed to retrieve titanium as well.
4-5.pulsar = Pulsar is a ground unit capable of doing multiple things, same as [accent]poly[].\nThey will automatically boost when they are mining , assisting or rebuilding.
# --4-6--
sector.rospule-4-6.name = 4-6\nFloating Wreckage
sector.rospule-4-6.description = Remnants of broken metal structures are floating in the middle of ocean.\nThe barren metal pieces are the only option to land on.\n[accent]No resources detected[], use loadouts from launched core to make units to defend.\n「[salmon]Guardian Presence[]」

4-6.core = This sector has [accent]no resources around[].\nUse the limited loadouts by unloading from the core.\nResources are [accent]heavily limited[], use wisely.
4-6.unit = [accent]No turrets[] available. Construct naval units as defensive option.\nUse [accent]command mode[] wisely to move around units to defend.\n has high accuracy.  can heal allied units.\n can repair core.  can attract enemy fire.\n applies shield to allied units.  inflicts melting status.
# --4-7--
sector.rospule-4-7.name = 4-7\nQuay Skirmish
sector.rospule-4-7.description = The enemy's biggest transport dock is located in this sector.\n[accent]A gigantic defense base[] detected, prepare for a long battle.\n[accent]Cryofluid[] and [accent]Plastanium[] technologies acquired.
 
4-7.cryo = Cryofluid Mixer makes cryofluid by mixing [unlaunched]water and titanium[].\nCryofluid is a type of liquid, which acts better as turrets' coolant than water.
4-7.plast = Plastanium is a processed resource produced from plastanium compressor.\nMore usage of it will be unlocked in later stages.
4-7.escalate1 = Enemy production begins in:{0}
4-7.escalate2 = Enemy production escalation begins in:{0}
4-7.escalate3 = Further enemy production escalation begins in:{0}
4-7.wave = Enemy waves begin in:{0}
4-7.escalate4 = Final enemy production escalation begins in:{0}
# --4-8--
sector.rospule-4-8.name = 4-8\nTwin Channels
sector.rospule-4-8.description = Two parallel channels split this region into 3 sections.\nEnemy units are approaching in multiple directions.\nTake advantage of the terrain to set up defenses.\n[accent]Plastanium conveyors[] and [accent]Plastanium walls[] unlocked.\n「[unlaunched]Night Times[]」

4-8.plastbelt0 = Plastanium conveyors transfer items in [accent]packs of 10[].
4-8.plastbelt1 = First, it accept inputs and [accent]pack[] them in units of [accent]10[].
4-8.plastbelt2 = Then, it transfer the [accent]item packs[].
4-8.plastbelt3 = Finally, when it reaches an end, it [accent]unpacks[] the items automatically.
4-8.input = Plastanium conveyors only pack items with [accent]same type[].\nMultiple entries are allowed to receive for packing.
4-8.block = Plastanium conveyors [accent]don't accept[] any inputs\nother than [accent]packs[] when transferring halfway.
4-8.unload = Unloaders can be used to unload packs from plastanium conveyors\n[accent]in advance[].
4-8.wall = Plastanium walls are insulate blocks.\nThey prevent automatic power node connections.\n[unlaunched]They are also capable of absorbing enemy lasers and energy weapons from piercing through[].
# --4-9--
sector.rospule-4-9.name = 4-9\nUninvited Guest
sector.rospule-4-9.description = A gigantic [accent]exponential tier[] unit detected in the upcoming attack.\nAdvanced turret and generator unlocked.\nThis unit has equipped with [accent]energy laser weapon[].\n[unlaunched]Plastanium Walls[] will be essential to prevent it piercing through.\n「[salmon]Guardian Presence[]」\n「[unlaunched]Night Times[]」

4-9.cyclone = Cyclone turret is capable of firing large bullet fragments. \n--[accent][High inaccuracy][]--\n--[accent][Targets Ground and Air][]--\n--[accent][Effective against Crowds][]--
4-9.differential = Differential Generator requires pyratite and cryofluid input to function.\n--Generate [accent]considerable amount[] of power--
4-9.boss = This sector has an [accent]exponential tier[] unit.\nPlastanium Walls are effective against it's weapon.\nExponential tier units are [unlaunched]extremely durable[].\nSetting up a heavier defense is strongly advised.
# --4-10--
sector.rospule-4-10.name = 4-10\nTurbulence
sector.rospule-4-10.description = These damp islands will be a cruel battleground against the enemies' prime naval fleet.\nThe invasion behaviour aroused enemy to deploy [salmon]all naval units[] patrolling globalwise.\n[salmon]This will be an unprecedented harsh cruel battle, stay attentive and fully focused[].\n「[scarlet]⚠Massive Enemy Offense⚠[]」

4-10.threat = [scarlet]--[]--\n--Incoming Transimission--\n\n\n{We}--{Grant}--{A}--{Burial}--{At}--{Sea}--\n--{Futile}--{Resistance}--{Thorough}--{Eradication}--{IMMINENT}--[]
4-10.countdown = ⚠Enemy offense begins in: {0}
4-10.naval = ⚠Enemy prime naval fleet arrives in: {0}
4-10.survive = Survive......
4-10.finalstage = [scarlet]⚠PROTECT THE CORE AT ALL COST⚠[]
4-10.win = [accent]Chapter 4 Finished![]
