sector.rospule-3-9.name = 3-9\nCollapsed Massifs
sector.rospule-3-9.description = During an earthquake, a landslide covered some derelicts beneath.\nLarger quantites of enemies are approaching.\n[unlaunched]Do not underestimate them[].\nResources are scattered, hard to route to core, [accent]polies[] will be helpful here.\nŃĆī[salmon]Guardian Presence[]ŃĆŹ

